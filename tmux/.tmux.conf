# =============================================================================
#  tmux.conf
# =============================================================================
#
#  Philosophy: keep it minimal. Uncomment sections as you discover needs.
#  Requires: tmux 3.2+ (brew install tmux)
#

# ---------------------------------------------------------------------------
#  Essentials
# ---------------------------------------------------------------------------

# Remap prefix from C-b to C-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Enable mouse support (scroll, click to select pane, resize panes)
set -g mouse on

# Start window/pane numbering at 1 (0 is too far away)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 10000

# Reduce escape delay (critical for Neovim)
set -sg escape-time 0

# Enable focus events (needed by Neovim autoread)
set -g focus-events on

# ---------------------------------------------------------------------------
#  True-color & undercurl support (Ghostty + Neovim)
# ---------------------------------------------------------------------------

# Tell tmux the terminal outside supports 256 colors
set -g default-terminal "tmux-256color"

# Enable true-color (RGB) passthrough — matches Ghostty's xterm-ghostty
set -as terminal-features ',xterm-ghostty:RGB'

# Undercurl support (for LSP diagnostics in Neovim)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ---------------------------------------------------------------------------
#  Vi mode
# ---------------------------------------------------------------------------

# Use vi keys in copy mode
setw -g mode-keys vi

# Vi-style copy-mode bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ---------------------------------------------------------------------------
#  Vim-tmux-navigator (seamless Ctrl+h/j/k/l pane navigation)
# ---------------------------------------------------------------------------
#  Same keys move between Neovim splits AND tmux panes — no mental switch.
#  Requires the Neovim plugin: christoomey/vim-tmux-navigator

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# ---------------------------------------------------------------------------
#  Split panes with intuitive keys
# ---------------------------------------------------------------------------

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows also inherit the current path
bind c new-window -c "#{pane_current_path}"

# ---------------------------------------------------------------------------
#  Catppuccin Macchiato theme (manual — no plugin needed)
# ---------------------------------------------------------------------------
#  Palette: base=#24273a surface0=#363a4f text=#cad3f5
#           blue=#8aadf4 green=#a6da95 mauve=#c6a0f6 peach=#f5a97f

set -g status-style "bg=#363a4f,fg=#cad3f5"
set -g status-left "#[bg=#8aadf4,fg=#24273a,bold] #S #[bg=#363a4f] "
set -g status-right "#[fg=#cad3f5] %H:%M "
set -g status-left-length 30

setw -g window-status-format "#[fg=#6e738d] #I:#W "
setw -g window-status-current-format "#[fg=#c6a0f6,bold] #I:#W "

set -g pane-border-style "fg=#363a4f"
set -g pane-active-border-style "fg=#8aadf4"

set -g message-style "bg=#363a4f,fg=#cad3f5"

# =============================================================================
#  GOODIES — Uncomment as you explore
# =============================================================================

# ---------------------------------------------------------------------------
#  TPM (Tmux Plugin Manager)
# ---------------------------------------------------------------------------
#  Install: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#  Then press: prefix + I (capital i) to install plugins
#
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
#
#  -- Catppuccin theme via plugin (replace the manual theme section above) --
# set -g @plugin 'catppuccin/tmux'
# set -g @catppuccin_flavor 'macchiato'
#
#  -- Session persistence (survive reboots) --
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
# set -g @continuum-restore 'on'
#
#  -- Better copy to system clipboard --
# set -g @plugin 'tmux-plugins/tmux-yank'
#
#  -- Initialize TPM (keep at the very bottom of the file) --
# run '~/.tmux/plugins/tpm/tpm'

